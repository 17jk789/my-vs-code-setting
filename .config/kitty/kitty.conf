# Theming
# include ~/.local/state/quickshell/user/generated/terminal/kitty-theme.conf
#
# Font
# font_family      JetBrains Mono Nerd Font
# font_size 11
#
# Cursor
# cursor_shape beam
# cursor_trail 1
#
# Padding (why weird value? consistency with foot)
# window_margin_width 6
#
# No stupid close confirmation
# confirm_os_window_close 0
#
# Use fish shell
# shell fish
#
# Copy
# map ctrl+c    copy_or_interrupt
#
# Search
# map ctrl+f   launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id
# map kitty_mod+f   launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id
#
# Scroll & Zoom
# map page_up    scroll_page_up
# map page_down    scroll_page_down
#
# map ctrl+plus  change_font_size all +1
# map ctrl+equal  change_font_size all +1
# map ctrl+kp_add  change_font_size all +1
# map ctrl+minus       change_font_size all -1
# map ctrl+underscore       change_font_size all -1
# map ctrl+kp_subtract       change_font_size all -1
# map ctrl+0 change_font_size all 0
# map ctrl+kp_0 change_font_size all 0

# THEME
# include ~/.local/state/quickshell/user/generated/terminal/kitty-theme.conf

# kitty +kitten themes --theme-name "Catppuccin-Mocha"
foreground              #CDD6F4
background              #1E1E2E
selection_foreground    #1E1E2E
selection_background    #F5E0DC

# Cursor colors
cursor                  #F5E0DC
cursor_text_color       #1E1E2E

# URL underline color when hovering with mouse
url_color               #F5E0DC

# Kitty window border colors
active_border_color     #45475b
inactive_border_color   #45475b
bell_border_color       #F9E2AF

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# Colors for marks (marked text in the terminal)
mark1_foreground #1E1E2E
mark1_background #B4BEFE
mark2_foreground #1E1E2E
mark2_background #CBA6F7
mark3_foreground #1E1E2E
mark3_background #74C7EC

# The 16 terminal colors

# black
color0 #45475A
color8 #585B70

# red
color1 #F38BA8
color9 #F38BA8

# green
color2  #A6E3A1
color10 #A6E3A1

# yellow
color3  #F9E2AF
color11 #F9E2AF

# blue
color4  #89B4FA
color12 #89B4FA

# magenta
color5  #F5C2E7
color13 #F5C2E7

# cyan
color6  #94E2D5
color14 #94E2D5

# white
color7  #BAC2DE
color15 #A6ADC8

color255 #CDD6F4
color254 #45475A
color253 #BAC2DE
color252 #585B70
color251 #A6ADC8
color250 #7F849C
color249 #F38BA8
color248 #BA1B1D

color232 #1E1E2E
color233 #CDD6F4
color234 #313244
color235 #BAC2DE
color236 #181825
color237 #11111B
color238 #F38BA8
color239 #F2CDCD
color240 #1E1E2E

# Some stuff should specifically use colors in the middle
color243 #A6ADC8
color244 #F38BA8
color245 #6C7086

# FONT (Neovim perfect grid)
font_family JetBrainsMono Nerd Font
font_size 11.5

background_opacity 0.9
background_blur 0

# disable_ligatures cursor
disable_ligatures always
# font_hinting full
font_kerning yes

# harte Grid-Stabilität (wichtig für Neovim)
adjust_line_height 0
adjust_column_width 0

# CURSOR (clean Neovim feel)
cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0

# HYPRLAND / WAYLAND CORE
window_padding_width 0
window_margin_width 0
hide_window_decorations yes
confirm_os_window_close 0

# Extra
enabled_layouts splits,stack,tall
allow_remote_control yes
# allow_remote_control socket-only
# listen_on unix:/tmp/kitty
# allow_remote_control socket-only
shell_integration enabled no-cursor
# text_composition_strategy legacy
# cursor_trail 1
draw_minimal_borders yes
# symbol_map U+2500-U+257F Symbols Nerd Font Mono
# symbol_map U+E000-U+F8FF Symbols Nerd Font Mono
wayland_enable_ime no
font_hinting none
text_composition_strategy 1.0 0

# echte Low-Latency Pipeline
repaint_delay 1
input_delay 1
sync_to_monitor yes
# sync_to_monitor no

linux_display_server wayland

# SCROLLBACK / UX
scrollback_lines 20000

wheel_scroll_multiplier 3
touch_scroll_multiplier 3

scrollback_pager less --RAW-CONTROL-CHARS --chop-long-lines

# SHELL
shell fish --login

# CLIPBOARD (Neovim workflow clean)
# copy_on_select yes
copy_on_select clipboard
# copy_on_select clipboard
strip_trailing_spaces smart

# map ctrl+c copy_or_interrupt
# map ctrl+shift+v paste_from_clipboard

# SEARCH (overlay UX)
map ctrl+f launch --type=overlay kitty +kitten search.py
map kitty_mod+f launch --type=overlay kitty +kitten search.py

# NAVIGATION (optional split control)
map ctrl+alt+h neighboring_window left
map ctrl+alt+j neighboring_window bottom
map ctrl+alt+k neighboring_window top
map ctrl+alt+l neighboring_window right

# ZOOM
map ctrl+plus change_font_size all +1
map ctrl+minus change_font_size all -1
map ctrl+0 change_font_size all 0

# HYPRLAND FEEL FIXES
mouse_hide_wait 1.0
enable_audio_bell no
visual_bell_duration 0.1
# wayland_titlebar_color system

# TABS
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab

map ctrl+tab next_tab
map ctrl+shift+tab previous_tab

map shift+ctrl+, move_tab_backward
map shift+ctrl+. move_tab_forward

# WINDOWS / SPLITS

# horizontal split
map ctrl+shift+e launch --location=hsplit

# vertical split
map ctrl+shift+o launch --location=vsplit

# navigation
map alt+left neighboring_window left
map alt+right neighboring_window right
map alt+up neighboring_window up
map alt+down neighboring_window down

# optional vim-style nav
map alt+h neighboring_window left
map alt+j neighboring_window down
map alt+k neighboring_window up
map alt+l neighboring_window right

# resize splits
map alt+shift+left resize_window narrower 10
map alt+shift+right resize_window wider 10
map alt+shift+up resize_window shorter 5
map alt+shift+down resize_window taller 5

# maximize current split
map ctrl+shift+enter toggle_layout stack

# WINDOW MANAGEMENT
map ctrl+shift+n new_os_window
map ctrl+shift+q close_os_window

# fullscreen/maximize
map ctrl+shift+m toggle_fullscreen

# FONT SIZE
map ctrl+equal change_font_size all +1
# map ctrl+minus change_font_size all -1
# map ctrl+0 change_font_size all 0

# CLIPBOARD
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# CONFIG
map ctrl+comma edit_config_file
map ctrl+shift+comma reload_config

# Such-Funktion aktivieren (Strg + Shift + F und Strg + F)
map ctrl+shift+f launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id
map ctrl+f       launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id

# Scroll
map page_up    scroll_page_up
map page_down    scroll_page_down
